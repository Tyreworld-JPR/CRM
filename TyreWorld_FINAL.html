<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TyreWorld CRM</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
.header{background:#ff5722;color:#fff;padding:15px;font-size:20px}
.container{padding:12px}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{flex:1;min-width:120px;background:#fff;padding:12px;border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.1);text-align:center}
.stat b{font-size:18px}
.buttons{margin:10px 0}
button{padding:10px;border:none;border-radius:6px;margin:4px;cursor:pointer}
.today{background:#4caf50;color:#fff}
.overdue{background:#f44336;color:#fff}
.follow{background:#2196f3;color:#fff}
.filter{background:#eee}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.1)}
.name{font-weight:bold}
.tag{font-size:11px;padding:3px 6px;border-radius:5px;margin-left:5px}
.tod{background:#4caf50;color:#fff}
.ovd{background:#f44336;color:#fff}
.upc{background:#ff9800;color:#fff}
.fut{background:#9e9e9e;color:#fff}
</style>
</head>

<body>

<div class="header">🚗 TyreWorld CRM</div>

<div class="container">

<div class="stats">
  <div class="stat"><b id="todayCount">0</b><br>Today</div>
  <div class="stat"><b id="overCount">0</b><br>Overdue</div>
  <div class="stat"><b id="upCount">0</b><br>Tomorrow</div>
  <div class="stat"><b id="futureCount">0</b><br>Future</div>
</div>

<div class="buttons">
  <button class="today" onclick="sendToday()">🚀 Send Today</button>
  <button class="overdue" onclick="sendOverdue()">⚠ Send Overdue</button>
  <button class="follow" onclick="sendFollowUps()">🔁 Follow-Up</button>
</div>

<div class="buttons">
  <button class="filter" onclick="filter('all')">All</button>
  <button class="filter" onclick="filter('today')">Today</button>
  <button class="filter" onclick="filter('tomorrow')">Tomorrow</button>
  <button class="filter" onclick="filter('overdue')">Overdue</button>
  <button class="filter" onclick="filter('future')">Future</button>
</div>

<div id="list"></div>

</div>

<script>

// 🔗 Google Sheet CSV
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVujJhOe5wbd7GZOTbbvDxG3DSQXyj7vynDP68DXuaYPk2SyFXIC84DuQFivAQrLnrYA2tBZt5SiKj/pub?output=csv";

let customers = [];

// LOAD DATA
async function loadData(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

  customers = rows.slice(1).map(r => ({
    name: r[0]?.trim(),
    mobile: r[1]?.trim(),
    vehicle: r[2]?.trim(),
    next_due_date: r[3]?.trim(),
    last_sent_date: ""
  }));

  categorize();
}

loadData();

// DATE LOGIC
function categorize(){
  let today = new Date().toISOString().split("T")[0];

  let tomorrowDate = new Date();
  tomorrowDate.setDate(new Date().getDate()+1);
  let tomorrow = tomorrowDate.toISOString().split("T")[0];

  customers.forEach(c=>{
    if(c.next_due_date < today) c.status="overdue";
    else if(c.next_due_date===today) c.status="today";
    else if(c.next_due_date===tomorrow) c.status="tomorrow";
    else c.status="future";
  });

  updateStats();
  display(customers);
}

// STATS
function updateStats(){
  document.getElementById("todayCount").innerText = customers.filter(c=>c.status==="today").length;
  document.getElementById("overCount").innerText = customers.filter(c=>c.status==="overdue").length;
  document.getElementById("upCount").innerText = customers.filter(c=>c.status==="tomorrow").length;
  document.getElementById("futureCount").innerText = customers.filter(c=>c.status==="future").length;
}

// DISPLAY
function display(data){
  let html="";
  data.forEach((c,i)=>{
    let tagClass = c.status==="today"?"tod":c.status==="overdue"?"ovd":c.status==="tomorrow"?"upc":"fut";

    html += `
    <div class="card">
      <div class="name">${c.name} <span class="tag ${tagClass}">${c.status}</span></div>
      <div>${c.mobile}</div>
      <div>Due: ${c.next_due_date}</div>
      <button onclick="sendSingle('${c.mobile}','${c.name}',${i})">WhatsApp</button>
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
}

// FILTER
function filter(type){
  if(type==="all") display(customers);
  else display(customers.filter(c=>c.status===type));
}

// SEND SINGLE
function sendSingle(num,name,index){
  let msg = `Namaste ${name} ji 🙏 Tyre check-up due hai`;
  window.open(`https://wa.me/91${num}?text=${encodeURIComponent(msg)}`);
  markSent(index);
}

// SEND TODAY
function sendToday(){
  customers.forEach((c,i)=>{
    if(c.status==="today"){
      sendSingle(c.mobile,c.name,i);
    }
  });
}

// SEND OVERDUE
function sendOverdue(){
  customers.forEach((c,i)=>{
    if(c.status==="overdue"){
      sendSingle(c.mobile,c.name,i);
    }
  });
}

// FOLLOW-UP
function sendFollowUps(){
  let today = new Date();

  customers.forEach(c=>{
    if(!c.last_sent_date) return;

    let last = new Date(c.last_sent_date);
    let diff = Math.floor((today-last)/(1000*60*60*24));

    if(diff===3 || diff===7){
      let msg = `Namaste ${c.name} ji 🙏 Reminder tyre check pending hai`;
      window.open(`https://wa.me/91${c.mobile}?text=${encodeURIComponent(msg)}`);
    }
  });
}

// MARK SENT
function markSent(i){
  customers[i].last_sent_date = new Date().toISOString().split("T")[0];
}

</script>

</body>
</html>
